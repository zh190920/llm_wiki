# Local RAG System 配置文件
# 所有配置项均可通过环境变量覆盖

# LLM 配置
llm:
  api_key: "${OPENAI_API_KEY}"     # 从环境变量读取
  base_url: "https://api.openai.com/v1"
  chat_model: "gpt-4o-mini"
  embedding_model: "text-embedding-3-small"
  embedding_dim: 1536
  max_tokens: 4096
  temperature: 0.3
  timeout: 120.0

# 检索配置
retriever:
  vector_top_k: 10
  keyword_top_k: 10
  rerank_top_k: 5
  similarity_threshold: 0.5
  mmr_lambda: 0.7
  hybrid_alpha: 0.7
  graph_enabled: false              # 是否启用图增强检索（需先构建知识图谱）
  graph_alpha: 0.3                  # 图增强在RRF融合中的权重（0-1，与hybrid_alpha互补）
  graph_max_related: 10             # 图增强检索最多返回的块数

# 分块配置
chunker:
  chunk_size: 512
  chunk_overlap: 64
  separator: "\n\n"

# Agent 配置
agent:
  max_iterations: 10
  max_context_tokens: 128000
  parallel_tool_calls: true
  thinking_enabled: true
  max_tool_output_size: 16384

# Wiki 配置
wiki:
  granularity: "standard"          # focused / standard / exhaustive
  max_concurrent_extractions: 4
  chunk_batch_size: 5
  debounce_seconds: 5.0
  wiki_dir: "./wiki_output"

# 数据存储
data_dir: "./data"
vector_store_dir: "./data/vector_store"
graph_store_path: "./data/knowledge_graph.json"

# API 服务
host: "0.0.0.0"
port: 8000
workers: 4
