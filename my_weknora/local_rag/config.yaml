# Local RAG System 配置文件
# 所有配置项均可通过环境变量覆盖

# LLM 配置
llm:
  api_key: ""     # 从环境变量读取
  base_url: "https://api.siliconflow.cn/v1"
  chat_model: "Qwen/Qwen3-30B-A3B-Instruct-2507"
  embedding_model: "BAAI/bge-m3"
  embedding_dim: 1024
  max_tokens: 4096
  temperature: 0.3
  timeout: 120.0

# 检索配置
retriever:
  vector_top_k: 10
  keyword_top_k: 10
  rerank_top_k: 5
  similarity_threshold: 0.5
  mmr_lambda: 0.7
  hybrid_alpha: 0.7

# 分块配置
chunker:
  chunk_size: 512
  chunk_overlap: 64
  separator: "\n\n"

# Agent 配置
agent:
  max_iterations: 10
  max_context_tokens: 128000
  parallel_tool_calls: true
  thinking_enabled: true
  max_tool_output_size: 16384

# Wiki 配置
wiki:
  granularity: "standard"          # focused / standard / exhaustive
  max_concurrent_extractions: 4
  chunk_batch_size: 5
  debounce_seconds: 5.0
  wiki_dir: "output/wiki"

# 数据存储
data_dir: "output"
vector_store_dir: "output/vector_store"
graph_store_path: "output/knowledge_graph.json"

# API 服务
host: "0.0.0.0"
port: 5000
workers: 4
